name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install package (dev)
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/ tests/

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install package (dev + chat)
        run: pip install -e ".[dev,chat]"
      - name: Pytest (integrations gate)
        # Focused gate while chart/media suites catch up; expand as those modules stabilize.
        run: >
          pytest -q --tb=line
          tests/test_mcp_server.py
          tests/test_openclaw_features.py
          tests/test_hermes_features.py
          tests/test_project_rules.py
          tests/test_clipboard_history.py
          tests/test_agent_hub.py
          tests/test_llm_fallback.py
          tests/test_convert_media.py::test_route_convert_media
